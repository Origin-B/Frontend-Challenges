<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <title>Order Summary</title>
  </head>
  <body>
    <div class="card-container">
      <header>
        <img src="images/illustration-hero.svg"alt="A woman listening to music and dance" class="header-img">
      </header>
      <main>
        <article>
          <section class="intro-sec">
            <h1>Order Summary</h1>
            <p>You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>
          </section>
          <section class="plan-sec">
            <img src="images/icon-music.svg" alt="icon-music" class="plan-sec-img">
            <div>
            <h2>Annual Plan</h2>
            <p>$59.99/year</p>  
            </div>
            <a href="#"target="_blank">change</a>
          </section>
          <section class="but-sec">
            <button class="but-1" type="button">Proceed to Payment</button>
            <button class="but-2" type="button">Cancel Order</button>
          </section>
        </article>
      </main>
      <footer>
        <img src="images/Logo.jpeg" alt="OriginB logo" class="footer-img">
        <p>Coded by Beshoy Essam (<a href="https://github.com/Origin-B" target="_blank" class="Origin-B"> Origin<span>B</span></a>). Challenge by <a href="https://www.frontendmentor.io/challenges/order-summary-component-QlPmajDUj" target="_blank"> Frontend Mentor</a>.</p>
      </footer>
    </div>
  </body>
</html>
